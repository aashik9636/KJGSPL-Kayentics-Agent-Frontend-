<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="55%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- ICON: agent-nodes forming a "K" -->
  <g transform="translate(10,10)">
    <!-- vertical stroke of K -->
    <rect x="20" y="12" width="16" height="136" rx="8" fill="url(#kGrad)"/>

    <!-- upper diagonal arm: agents branching outward, converging at the spine -->
    <path d="M36 80 L88 24" stroke="url(#kGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M88 24 L124 8"  stroke="url(#kGrad)" stroke-width="7"  stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M124 8 L150 2" stroke="url(#kGrad)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>

    <!-- lower diagonal arm -->
    <path d="M36 88 L90 148" stroke="url(#kGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M90 148 L126 168" stroke="url(#kGrad)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M126 168 L152 176" stroke="url(#kGrad)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>

    <!-- agent nodes (each circle = one AI agent) -->
    <circle cx="28" cy="84" r="13" fill="url(#nodeGrad)"/>
    <circle cx="88" cy="24" r="9" fill="#F8FAFC" stroke="url(#nodeGrad)" stroke-width="3"/>
    <circle cx="124" cy="8" r="6" fill="url(#nodeGrad)"/>
    <circle cx="150" cy="2" r="4" fill="#22D3EE"/>

    <circle cx="90" cy="148" r="9" fill="#F8FAFC" stroke="url(#nodeGrad)" stroke-width="3"/>
    <circle cx="126" cy="168" r="6" fill="url(#nodeGrad)"/>
    <circle cx="152" cy="176" r="4" fill="#7C3AED"/>
  </g>

  <!-- WORDMARK -->
  <text x="215" y="112" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="58" letter-spacing="0.5" fill="#0F172A">kay<tspan fill="url(#kGrad)">netics</tspan></text>
  <text x="217" y="140" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="17" letter-spacing="3.5" fill="#64748B">MULTI-AGENT AI PLATFORM</text>
</svg>
